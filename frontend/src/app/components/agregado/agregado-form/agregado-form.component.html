<div class="main-container">
  <div class="container-fluid">
    <div class="row mb-4">
      <div class="col-12">
        <header>
          <h3><i class="bi bi-person-check"></i> {{ isEditMode ? 'Editar' : 'Novo' }} Agregado</h3>
        </header>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-8 mx-auto">
        <div class="card card-custom">
          <div class="card-body">
            <form [formGroup]="agregadoForm" (ngSubmit)="onSubmit()">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <label class="form-label"><i class="bi bi-person"></i> Nome Completo *</label>
                  <input type="text" class="form-control" formControlName="nomeAgre" [class.is-invalid]="submitted && f['nomeAgre'].errors" placeholder="Digite o nome completo">
                  <div class="invalid-feedback" *ngIf="submitted && f['nomeAgre'].errors">Nome é obrigatório</div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label"><i class="bi bi-telephone"></i> Telefone *</label>
                  <input type="text" class="form-control" formControlName="telefoneAgre" [class.is-invalid]="submitted && f['telefoneAgre'].errors" placeholder="(11) 98765-4321">
                  <div class="invalid-feedback" *ngIf="submitted && f['telefoneAgre'].errors">Telefone é obrigatório</div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label"><i class="bi bi-card-text"></i> CPF *</label>
                  <input type="text" class="form-control" formControlName="cpfAgre" [class.is-invalid]="submitted && f['cpfAgre'].errors" placeholder="000.000.000-00">
                  <div class="invalid-feedback" *ngIf="submitted && f['cpfAgre'].errors">CPF é obrigatório</div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label"><i class="bi bi-card-heading"></i> CNH *</label>
                  <input type="text" class="form-control" formControlName="cnhAgre" [class.is-invalid]="submitted && f['cnhAgre'].errors" placeholder="Digite o número da CNH">
                  <div class="invalid-feedback" *ngIf="submitted && f['cnhAgre'].errors">CNH é obrigatória</div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label"><i class="bi bi-calendar"></i> Data de Nascimento *</label>
                  <input type="date" class="form-control" formControlName="datanascAgre" [class.is-invalid]="submitted && f['datanascAgre'].errors">
                  <div class="invalid-feedback" *ngIf="submitted && f['datanascAgre'].errors">Data de nascimento é obrigatória</div>
                </div>
                <div class="col-md-6 mb-3">
                  <label class="form-label"><i class="bi bi-calendar-check"></i> Validade Buonny *</label>
                  <input type="date" class="form-control" formControlName="buonnyAgre" [class.is-invalid]="submitted && f['buonnyAgre'].errors">
                  <div class="invalid-feedback" *ngIf="submitted && f['buonnyAgre'].errors">Data do exame é obrigatória</div>
                </div>
                <div class="col-12 mb-3">
                  <label class="form-label"><i class="bi bi-geo-alt"></i> Endereço Completo *</label>
                  <input type="text" class="form-control" formControlName="enderecoAgre" [class.is-invalid]="submitted && f['enderecoAgre'].errors" placeholder="Rua, número, bairro, cidade - UF">
                  <div class="invalid-feedback" *ngIf="submitted && f['enderecoAgre'].errors">Endereço é obrigatório</div>
                </div>
              </div>
              <div class="d-flex justify-content-end gap-2 mt-4">
                <button type="button" class="btn btn-secondary" (click)="voltar()" [disabled]="loading">
                  <i class="bi bi-arrow-left"></i> Voltar
                </button>
                <button type="submit" class="btn btn-primary" [disabled]="loading">
                  <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                  <i class="bi bi-check-circle" *ngIf="!loading"></i>
                  {{ loading ? 'Salvando...' : 'Salvar' }}
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
