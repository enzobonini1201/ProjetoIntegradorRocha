<div class="login-container">
    <!-- Lado Esquerdo - Logo e Marca -->
    <div class="left-side">
        <div class="logo-container">
            <img src="assets/Logo rocha.png" alt="Logo Rocha" class="logo-rocha">
        </div>
        <div class="welcome-text">
            <h2>Bem-vindo de volta!</h2>
            <p>Sistema de Gerenciamento Rocha Transportes</p>
        </div>
    </div>

    <!-- Lado Direito - Formulário -->
    <div class="right-side">
        <div class="form-container">
            <div class="form-header">
                <h1 class="form-title">Login</h1>
                <p class="form-subtitle">Entre com suas credenciais para acessar o sistema</p>
            </div>

            <div class="alert alert-danger" *ngIf="error" [class.shake]="error">
                <i class="bi bi-exclamation-triangle"></i> {{ error }}
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
                <div class="input-group-modern">
                    <label for="login" class="form-label-modern">CPF (somente números)</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="login" 
                            formControlName="login"
                            (input)="formatarCPF($event)"
                            [class.is-invalid]="submitted && f['login'].errors"
                            placeholder="Digite seu CPF sem pontos e hífen"
                            maxlength="11">
                    </div>
                    <div class="invalid-feedback" *ngIf="submitted && f['login'].errors">
                        Preencha o campo de CPF.
                    </div>
                    <small class="form-text text-muted" style="display: block; margin-top: 5px;">
                        <i class="bi bi-info-circle"></i> Digite apenas os números do CPF (ex: 12345678900)
                    </small>
                </div>

                <div class="input-group-modern">
                    <label for="senha" class="form-label-modern">Senha</label>
                    <div class="input-group" style="position: relative;">
                        <span class="input-group-text">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        <input 
                            [type]="showPassword ? 'text' : 'password'"
                            class="form-control" 
                            id="senha" 
                            formControlName="senha"
                            [class.is-invalid]="submitted && f['senha'].errors"
                            placeholder="Digite sua senha"
                            style="padding-right: 45px;">
                        <button type="button" class="password-toggle-modern" (click)="togglePassword()">
                            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
                        </button>
                    </div>
                    <div class="invalid-feedback" *ngIf="submitted && f['senha'].errors">
                        Preencha o campo de senha.
                    </div>
                </div>

                <button 
                    type="submit" 
                    class="btn btn-login" 
                    [disabled]="loading">
                    <span *ngIf="!loading">Entrar</span>
                    <span *ngIf="loading">
                        <i class="bi bi-check-circle-fill"></i> Entrando...
                    </span>
                </button>

                <div class="divider">
                    <span>ou</span>
                </div>

                <div class="text-center-modern" style="margin-bottom: 15px;">
                    <a routerLink="/recuperar-senha" class="link-modern">
                        <i class="bi bi-question-circle"></i> Esqueceu sua senha?
                    </a>
                </div>

                <div class="text-center-modern">
                    Não tem conta? 
                    <a routerLink="/cadastro" class="link-modern">
                        <i class="bi bi-person-plus"></i> Cadastre-se
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
