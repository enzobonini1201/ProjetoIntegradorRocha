<header class="p-3 mb-3 border-bottom header container-fluid">
  <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
    <a routerLink="/home">
      <img class="Logo" src="assets/Logo rocha.png" alt="Logo rocha">
    </a>
    <div class="alinhamento-header">
      <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0 titulo">
        <li>
          <div class="dropdown">
            <button class="dropbtn">MOTORISTAS</button>
            <div class="dropdown-content">
              <a routerLink="/motoristas/novo">CADASTRAR</a>
              <a routerLink="/motoristas">CONSULTAR</a>
            </div>
          </div>
        </li>

        <li>
          <div class="dropdown">
            <button class="dropbtn">AGREGADOS</button>
            <div class="dropdown-content">
              <a routerLink="/agregados/novo">CADASTRAR</a>
              <a routerLink="/agregados">CONSULTAR</a>
            </div>
          </div>
        </li>

        <li>
          <div class="dropdown">
            <button class="dropbtn">AJUDANTES</button>
            <div class="dropdown-content">
              <a routerLink="/ajudantes/novo">CADASTRAR</a>
              <a routerLink="/ajudantes">CONSULTAR</a>
            </div>
          </div>
        </li>

        <li>
          <div class="dropdown">
            <button class="dropbtn">TRANSPORTES</button>
            <div class="dropdown-content">
              <a routerLink="/transportes/novo">CADASTRAR</a>
              <a routerLink="/transportes">CONSULTAR</a>
            </div>
          </div>
        </li>

        <li>
          <div class="dropdown">
            <button class="dropbtn">CLIENTES</button>
            <div class="dropdown-content">
              <a routerLink="/clientes/novo">CADASTRAR</a>
              <a routerLink="/clientes">CONSULTAR</a>
            </div>
          </div>
        </li>

        <li>
          <div class="dropdown">
            <button class="dropbtn">NOTAS</button>
            <div class="dropdown-content">
              <a routerLink="/notas/novo">CADASTRAR</a>
              <a routerLink="/notas">CONSULTAR</a>
            </div>
          </div>
        </li>

        <li>
          <div class="dropdown">
            <button class="dropbtn">ROTAS</button>
            <div class="dropdown-content">
              <a routerLink="/rotas/novo">CADASTRAR</a>
              <a routerLink="/rotas">CONSULTAR</a>
            </div>
          </div>
        </li>
      </ul>
    </div>
    <div class="dropdown perfil" *ngIf="currentUser">
      <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" fill="currentColor" 
           class="bi bi-person-lines-fill" viewBox="0 0 16 16">
        <path d="M6 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m-5 6s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zM11 3.5a.5.5 0 0 1 .5-.5h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 1-.5-.5m.5 2.5a.5.5 0 0 0 0 1h4a.5.5 0 0 0 0-1zm2 3a.5.5 0 0 0 0 1h2a.5.5 0 0 0 0-1zm0 3a.5.5 0 0 0 0 1h2a.5.5 0 0 0 0-1z"/>
      </svg>
      <div class="dropdown-content">
        <a routerLink="/perfil">PERFIL</a>
        <a (click)="logout()" style="cursor: pointer;">SAIR</a>
      </div>
    </div>
  </div>
</header>
